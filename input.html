<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Perjalanan School Bus</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e90ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="School Bus App">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#1e90ff;--primary-dark:#187bdb;--success:#16a34a;
      --bg:#f4f7fb;--card:#ffffff;--text:#1f2937;--muted:#6b7280;
      --border:#dbe3ee;--shadow:0 8px 24px rgba(15,23,42,.08);--radius:18px;
    }
    body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:16px;padding-bottom:90px;max-width:760px;margin:0 auto}
   .topbar{background:linear-gradient(135deg,#1e90ff,#60a5fa);color:#fff;border-radius:22px;padding:20px;margin-bottom:16px;box-shadow:0 12px 30px rgba(30,144,255,.20)}
   .topbar-title{font-size:24px;font-weight:700;margin-bottom:6px}
   .topbar-subtitle{font-size:13px;line-height:1.6;opacity:.95}
   .card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid #edf2f7}
    h3{margin-bottom:12px;color:#111827;font-size:18px}
    label{display:block;font-size:14px;font-weight:600;margin-bottom:6px;margin-top:12px;color:#374151}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:14px;outline:none;background:#fff;transition:.2s ease}
    textarea{min-height:90px;resize:vertical;font-family:Arial,sans-serif}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(30,144,255,.10)}
    input[readonly]{background:#f8fafc;color:#6b7280;font-weight:700}
   .save{width:100%;border:none;border-radius:12px;padding:13px 14px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;margin-top:14px;background:var(--primary);transition:.2s ease}
   .save:hover{background:var(--primary-dark)}
   .full{width:100%}
    #previewTotal{margin-top:14px;padding:12px 14px;border-radius:12px;background:#eff6ff;color:#1d4ed8;font-weight:700;text-align:center;font-size:16px}
   .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 16px;border-radius:10px;opacity:0;pointer-events:none;transition:.25s;z-index:9999;max-width:90%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.18)}
   .toast.show{opacity:1}
   .mini-note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
   .section-box{padding:12px;border:1px dashed var(--border);border-radius:14px;margin-top:12px;background:#fafcff}
   .sidebar{position:fixed;top:0;left:-260px;width:240px;height:100%;background:#0f3057;color:#fff;transition:0.3s;z-index:1000;padding-top:20px}
   .sidebar.active{left:0}
   .sidebar h2{text-align:center;margin-bottom:20px}
   .sidebar a{display:block;padding:14px 20px;color:#fff;text-decoration:none}
   .sidebar a:hover{background:#1e90ff}
   .toggle-btn{position:fixed;top:12px;left:12px;background:#1e90ff;color:#fff;border:none;padding:10px;border-radius:10px;z-index:1100;cursor:pointer}
    @media(min-width:768px){
     .sidebar{left:0}
     .toggle-btn{display:none}
      body{margin-left:240px}
    }
    #driverCard label{font-weight:bold}
  </style>
</head>
<body>

<button class="toggle-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>🚌 School Bus</h2>
  </div>
  <div class="menu">
    <a href="index.html">🏠 <span>Dashboard</span></a>
    <a href="input.html">🚌 <span>Input</span></a>
    <a href="lapor.html">📊 <span>Laporan</span></a>
    <a href="driver.html" id="menuDriver">📊 <span>Driver</span></a>
    <a href="cari.html">✏️ Edit</a>
    <a href="config.html" id="menuConfig">⚙️ <span>Setting</span></a>
    <a href="user.html" id="menuUser">👤 <span>User</span></a>
  </div>
  <div class="sidebar-footer">
    <a href="#" onclick="logout()">🚪 <span>Logout</span></a>
  </div>
</div>

<div class="topbar">
  <div class="topbar-title">Input Perjalanan School Bus</div>
  <div class="topbar-subtitle">Input data perjalanan siswa berdasarkan driver, trayek, jarak, dan harga otomatis.</div>
</div>

<div class="card" id="driverCard">
  <label>Nama Driver</label>
  <select id="pilihDriver">
    <option value="">-- Memuat driver... --</option>
  </select>
  <button class="save full" onclick="lanjutSiswa()">➡️ Lanjut Input Siswa</button>
</div>

<div id="siswaContainer" style="display:none;">
  <div class="card">
    <h3>Driver: <span id="displayDriver">-</span></h3>

    <label>Tanggal</label>
    <input type="date" id="tanggalInput">

    <label>Nama Siswa</label>
    <input type="text" id="namaSiswa" placeholder="Masukkan nama siswa">

    <label>Kelas</label>
    <input type="text" id="kelas" placeholder="Masukkan kelas">

    <label>Alamat</label>
    <textarea id="alamat" placeholder="Masukkan alamat siswa"></textarea>

    <label>Jarak (Km)</label>
    <input type="number" id="jarak" step="0.1" placeholder="Masukkan jarak" oninput="updateHarga()">

    <label>Trayek</label>
    <select id="trayek" onchange="ubahTrayek()">
      <option value="">-- Pilih Trayek --</option>
      <option value="pergi">Pergi</option>
      <option value="pulang">Pulang</option>
      <option value="pp">PP</option>
    </select>

    <div id="onewaySection" class="section-box" style="display:none;">
      <label>Harga One Way (Rp)</label>
      <input id="hargaOneWay" readonly>
      <label>Diskon (%)</label>
      <input type="number" id="discOneWay" placeholder="0" oninput="hitungTotal()">
      <label>Total (Rp)</label>
      <input id="totalOneWay" readonly>
    </div>

    <div id="ppSection" class="section-box" style="display:none;">
      <label>Harga PP (Rp)</label>
      <input id="hargaPP" readonly>
      <label>Diskon (%)</label>
      <input type="number" id="discPP" value="0" oninput="hitungTotal()">
      <label>Total PP (Rp)</label>
      <input id="totalPP" readonly>
    </div>

    <button class="save" onclick="simpanData()">💾 Simpan Data</button>
    <div id="previewTotal">Preview Total: Rp 0</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxbArCZ6iIWQ8wS7QIonZOeN4t_r9o2WU",
  authDomain: "schoolbus-6a7fd.firebaseapp.com",
  databaseURL: "https://schoolbus-6a7fd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "schoolbus-6a7fd",
  storageBucket: "schoolbus-6a7fd.firebasestorage.app",
  messagingSenderId: "486602913199",
  appId: "1:486602913199:web:9547f39f5f57f9c87b2b5a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const role = localStorage.getItem("role");
const driverIdLogin = localStorage.getItem("driverId");

let selectedDriver = null;
let daftarDriver = [];
let configHarga = { hargaDasar: 608000, kenaikanPerTitik: 7800 };

document.addEventListener("DOMContentLoaded", async () => {
  if(!role){
    location.href = "index.html";
    return;
  }
  document.getElementById("tanggalInput").value = getToday();
  await loadConfigHarga();
  await loadDrivers();

  if(role!== "admin"){
    document.getElementById("menuUser").style.display = "none";
    document.getElementById("menuLaporan").style.display = "none";
    document.getElementById("menuConfig").style.display = "none";
    document.getElementById("menuDriver").style.display = "none";
  }
});

async function loadDrivers(){
  const pilihDriver = document.getElementById("pilihDriver");
  try{
    const snapshot = await getDocs(collection(db, "drivers"));
    daftarDriver = [];
    snapshot.forEach((docSnap)=>{
      const data = docSnap.data();
      daftarDriver.push({
        docId: docSnap.id,
        nama: data.namaDriver || data.nama || data.username || "Tanpa Nama"
      });
    });
    daftarDriver.sort((a,b)=>a.nama.localeCompare(b.nama,"id"));

    if(role === "admin"){
      pilihDriver.innerHTML = '<option value="">-- Pilih Driver --</option>';
      daftarDriver.forEach((driver,i)=>{
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = driver.nama;
        pilihDriver.appendChild(opt);
      });
    } else {
      document.getElementById("driverCard").style.display = "none";
      const driver = daftarDriver.find(d => d.docId === driverIdLogin);
      if(!driver){
        showToast("Driver tidak ditemukan");
        return;
      }
      selectedDriver = driver;
      document.getElementById("displayDriver").textContent = driver.nama;
      document.getElementById("siswaContainer").style.display = "block";
      resetFormAwal();
    }
  }catch(err){
    console.error(err);
    showToast("Gagal load driver");
  }
}

function lanjutSiswa(){
  const pilih = document.getElementById("pilihDriver").value;
  if(pilih === ""){
    showToast("Pilih driver dulu");
    return;
  }
  selectedDriver = daftarDriver[Number(pilih)];
  document.getElementById("displayDriver").textContent = selectedDriver.nama;
  document.getElementById("siswaContainer").style.display = "block";
  resetFormAwal();
}

function resetFormAwal(){
  document.getElementById("trayek").value = "";
  document.getElementById("jarak").value = "";
  document.getElementById("discOneWay").value = "";
  document.getElementById("discPP").value = "0";
  document.getElementById("hargaOneWay").value = "";
  document.getElementById("hargaPP").value = "";
  document.getElementById("totalOneWay").value = "";
  document.getElementById("totalPP").value = "";
  document.getElementById("onewaySection").style.display = "none";
  document.getElementById("ppSection").style.display = "none";
  document.getElementById("previewTotal").textContent = "Preview Total: Rp 0";
}

function rupiah(angka){
  return "Rp " + Number(angka || 0).toLocaleString("id-ID");
}

function getToday(){
  return new Date().toISOString().split("T")[0];
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

async function loadConfigHarga(){
  try{
    const snap = await getDoc(doc(db,"config","harga"));
    if(snap.exists()){
      configHarga = snap.data();
    }
  }catch(e){
    console.log("pakai default");
  }
}

function hitungHargaDasar(jarak){
  if (jarak <= 1) return configHarga.hargaDasar;

  const titik = Math.round(((jarak - 1) + Number.EPSILON) * 10);

  return configHarga.hargaDasar + (titik * configHarga.kenaikanPerTitik);
}

function ubahTrayek(){
  const trayek = document.getElementById("trayek").value;
  const oneway = document.getElementById("onewaySection");
  const pp = document.getElementById("ppSection");

  if(trayek === "pergi" || trayek === "pulang"){
    oneway.style.display = "block";
    pp.style.display = "none";
  } else if(trayek === "pp"){
    oneway.style.display = "none";
    pp.style.display = "block";
  } else {
    oneway.style.display = "none";
    pp.style.display = "none";
  }
  updateHarga();
}

function updateHarga(){
  const jarak = Number(document.getElementById("jarak").value || 0);
  const trayek = document.getElementById("trayek").value;
  if(!jarak ||!trayek) return;

  const harga = hitungHargaDasar(jarak);

  if(trayek === "pergi" || trayek === "pulang"){
    document.getElementById("hargaOneWay").value = rupiah(Math.round(harga));
  }
  if(trayek === "pp"){
    document.getElementById("hargaPP").value = rupiah(Math.round(harga * 2));
  }
  hitungTotal();
}

function hitungTotal(){
  const jarak = Number(document.getElementById("jarak").value || 0);
  const trayek = document.getElementById("trayek").value;
  if(!jarak ||!trayek) return 0;

  const harga = hitungHargaDasar(jarak);
  let total = 0;

  if(trayek === "pergi" || trayek === "pulang"){
    const diskon = Number(document.getElementById("discOneWay").value || 0);
    total = harga - (harga * diskon / 100);
    document.getElementById("totalOneWay").value = rupiah(Math.round(total));
  }

  if(trayek === "pp"){
    const hargaPP = harga * 2;
    const diskon = Number(document.getElementById("discPP").value || 0);
    total = hargaPP - (hargaPP * diskon / 100);
    document.getElementById("totalPP").value = rupiah(Math.round(total));
  }

  document.getElementById("previewTotal").textContent = "Preview Total: " + rupiah(Math.round(total));
  return Math.round(total);
}

async function simpanData(){
  if(!selectedDriver){
    showToast("Driver belum dipilih");
    return;
  }

  const tanggal = document.getElementById("tanggalInput").value;
  const namaSiswa = document.getElementById("namaSiswa").value.trim();
  const kelas = document.getElementById("kelas").value.trim();
  const alamat = document.getElementById("alamat").value.trim();
  const jarak = Number(document.getElementById("jarak").value || 0);
  const trayek = document.getElementById("trayek").value;
  const total = hitungTotal();

  // 🔥 CEK DATA KOSONG
  if(!tanggal ||!namaSiswa ||!kelas ||!alamat ||!jarak ||!trayek || total === 0){
    showToast("Lengkapi semua data dulu");
    return;
  }

  const data = {
    driverId: selectedDriver.docId,
    namaDriver: selectedDriver.nama,
    tanggal: tanggal,
    namaSiswa: namaSiswa,
    kelas: kelas,
    alamat: alamat,
    jarak: jarak,
    trayek: trayek,
    total: total,
    createdAt: serverTimestamp()
  };

  try{
    await addDoc(collection(db,"perjalanan"), data);
    showToast("✅ Simpan berhasil"); // 🔥 ALERT BERHASIL
    resetFormAwal();
    document.getElementById("tanggalInput").value = getToday();
    document.getElementById("namaSiswa").value = "";
    document.getElementById("kelas").value = "";
    document.getElementById("alamat").value = "";
  }catch(e){
    showToast("Gagal simpan: " + e.message);
  }
}

window.toggleSidebar = function(){
  document.getElementById("sidebar").classList.toggle("active");
}

document.addEventListener("click", function(e){
  const sidebar = document.querySelector(".sidebar");
  const btn = document.querySelector(".toggle-btn");
  if(!sidebar.contains(e.target) &&!btn.contains(e.target)){
    sidebar.classList.remove("active");
  }
});

window.logout = function(){
  localStorage.clear();
  location.href = "index.html";
}

window.lanjutSiswa = lanjutSiswa;
window.simpanData = simpanData;
window.hitungTotal = hitungTotal;
window.updateHarga = updateHarga;
window.ubahTrayek = ubahTrayek;
</script>
</body>
</html>
