<!-- ===== MAIN ===== -->
<div class="main">

  <header>
    <h2>Manajemen User</h2>
  </header>

  <input type="text" id="username" placeholder="Username">
  <input type="text" id="password" placeholder="Password">

  <select id="role" onchange="toggleDriver()">
    <option value="admin">Admin</option>
    <option value="driver">Driver</option>
  </select>

  <select id="driverId" style="display:none">
    <option value="">-- Pilih Driver --</option>
  </select>

  <button onclick="simpanUser()">Simpan User</button>

  <hr>

  <div id="listUser"></div>

</div>

<!-- ===== SCRIPT ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  updateDoc,
  getDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "schoolbus-6a7fd.firebaseapp.com",
  projectId: "schoolbus-6a7fd",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= AUTH =================
const role = (localStorage.getItem("role") || "").toLowerCase();
const login = localStorage.getItem("login");

if (login !== "true") {
  window.location.href = "index.html";
}

if (role !== "admin") {
  alert("Akses ditolak!");
  window.location.href = "dashboard.html";
}

// ================= STATE =================
let editId = null;
let driverMap = {};
let unsubscribeUser = null;
let unsubscribeDriver = null;

// ================= SIDEBAR =================
window.toggleSidebar = function () {
  document.getElementById("sidebar").classList.toggle("show");
};

window.logout = function () {
  localStorage.clear();
  window.location.href = "index.html";
};

// ================= DRIVER REALTIME =================
function loadDriverRealtime() {
  const select = document.getElementById("driverId");

  if (unsubscribeDriver) unsubscribeDriver();

  unsubscribeDriver = onSnapshot(collection(db, "drivers"), (snapshot) => {
    select.innerHTML = '<option value="">-- Pilih Driver --</option>';
    driverMap = {};

    snapshot.forEach((docSnap) => {
      const d = docSnap.data();
      const nama = d.nama || "-";

      driverMap[docSnap.id] = nama;

      const opt = document.createElement("option");
      opt.value = docSnap.id;
      opt.textContent = nama;
      select.appendChild(opt);
    });
  });
}

// ================= TOGGLE DRIVER =================
window.toggleDriver = function () {
  const roleInput = document.getElementById("role").value;
  document.getElementById("driverId").style.display =
    roleInput === "driver" ? "block" : "none";
};

// ================= USER REALTIME =================
function loadUserRealtime() {
  const list = document.getElementById("listUser");

  if (unsubscribeUser) unsubscribeUser();

  unsubscribeUser = onSnapshot(collection(db, "users"), (snapshot) => {
    list.innerHTML = "";

    snapshot.forEach((docSnap) => {
    const u = docSnap.data();

    if (u.role === "admin" && u.username !== "admin") {
        return;
    }

    const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="row">
          <b>${u.username}</b>
          <span>${u.role}</span>
        </div>

        <div class="row small">
          Driver: ${u.driverName || driverMap[u.driverId] || "-"}
        </div>

        <div class="row">
          <button class="icon-btn edit"
            onclick="editUser('${docSnap.id}')">✏️</button>

          <button class="icon-btn hapus"
            onclick="hapusUser('${docSnap.id}')">🗑️</button>
        </div>
      `;

      list.appendChild(card);
    });
  });
}

// ================= SIMPAN USER =================
async function simpanUser() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const roleInput = document.getElementById("role").value;
  const driverId = document.getElementById("driverId").value;

  if (!username || !password) {
    alert("Username & password wajib diisi");
    return;
  }

  if (roleInput === "driver" && !driverId) {
    alert("Driver wajib dipilih");
    return;
  }

  const payload = {
    username,
    password,
    role: roleInput,
    driverId: roleInput === "driver" ? driverId : "",
    driverName: roleInput === "driver" ? driverMap[driverId] : "",
    updatedAt: new Date()
  };

  try {
    if (editId) {
      await updateDoc(doc(db, "users", editId), payload);
    } else {
      await addDoc(collection(db, "users"), payload);
    }

    // sinkron ke driver
    if (roleInput === "driver" && driverId) {
      await updateDoc(doc(db, "drivers", driverId), {
        username: username
      });
    }

    resetForm();
  } catch (err) {
    alert("Gagal simpan: " + err.message);
  }
}

window.simpanUser = simpanUser;

// ================= EDIT =================
window.editUser = async function (id) {
  const snap = await getDoc(doc(db, "users", id));
  const u = snap.data();

  document.getElementById("username").value = u.username;
  document.getElementById("password").value = u.password;
  document.getElementById("role").value = u.role;
  document.getElementById("driverId").value = u.driverId || "";

  toggleDriver();
  editId = id;
};

// ================= HAPUS =================
window.hapusUser = async function (id) {
  if (!confirm("Hapus user ini?")) return;

  try {
    await deleteDoc(doc(db, "users", id));
  } catch (err) {
    alert("Gagal hapus: " + err.message);
  }
};

// ================= RESET =================
function resetForm() {
  editId = null;
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
  document.getElementById("role").value = "admin";
  document.getElementById("driverId").value = "";
  toggleDriver();
}

// ================= INIT =================
loadDriverRealtime();
toggleDriver();
loadUserRealtime();
</script>
</script>
